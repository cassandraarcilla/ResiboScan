name: resiboscan
description: A receipt scanner and organizer app.

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  http: ^1.2.1
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.3
  sqflite: ^2.3.3
  path: ^1.9.0
  camera: ^0.11.0+2
  photo_manager: ^3.0.0
  photo_manager_image_provider: ^2.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/